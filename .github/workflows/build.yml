name: Build ESP32 Firmware

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5
          target: esp32
          # If your CMakeLists.txt is in the root, remove the 'cd' part.
          # If it is inside a folder, keep the 'cd' command below.
          command: idf.py build

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            Esp32-bootloader/build/bootloader/bootloader.bin
            Esp32-bootloader/build/partition_table/partition-table.bin
            Esp32-bootloader/build/*.bin
          if-no-files-found: error

